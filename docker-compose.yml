version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: inventory_db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory_user -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: inventory_api
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://inventory_user:inventory_pass@postgres:5432/inventory_db
      - PORT=3000
      - NODE_ENV=development
      - LLM_PROVIDER=local
      - LOCAL_LLM_URL=http://host.docker.internal:11434 # Enables connecting to Ollama on your host machine
    depends_on:
      postgres:
        condition: service_healthy
    # Propose running migrations and seeding before starting the API server
    command: >
      sh -c "npm run migrate && npm run seed && npm start"

volumes:
  postgres_data:
