name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker Compose (DB + Backend)
        run: docker compose up -d --build

      - name: Wait for Backend to be ready
        run: |
          sleep 15
          curl --retry 5 --retry-delay 5 --retry-connrefused http://localhost:3000/api/ping
          curl --retry 5 --retry-delay 5 --retry-connrefused http://localhost:3000/api/health

      - name: Run Backend Tests (if you have jest)
        run: docker compose exec -T api npm test
        continue-on-error: true  # Remove this line once tests pass

      - name: Shut down Docker Compose
        run: docker compose down

